# Generic Document Workflow
#
# A flexible, open-ended workflow for producing any kind of written artifact —
# research reports, proposals, analyses, comparisons, guides, summaries, or
# any document that benefits from iterative expert authoring and review.
#
# Unlike the design and plan workflows (which target specific document formats),
# this workflow adapts its structure and content to whatever the purpose demands.
#
# The artifact passes through two independent review cycles:
#   1. Content Reviewer — validates accuracy, depth, completeness, and reasoning
#   2. Quality Reviewer — ensures clarity, structure, coherence, and audience fit
#
# Usage:
#   conductor run workflows/document.yaml --input purpose="Research the trade-offs between gRPC and REST for internal service communication"
#
# With explicit output path:
#   conductor run workflows/document.yaml --input purpose="..." --input output_path="docs/grpc-vs-rest.md"
#
# With verbose output:
#   conductor -V run workflows/document.yaml --input purpose="..."
#
# Flow:
#   author → content_reviewer
#     → quality_reviewer → (loop back to author if either < 85)
#       → $end

workflow:
  name: document
  description: Create any written artifact through iterative authoring with content and quality review cycles
  version: "1.0.0"
  entry_point: author

  runtime:
    provider: copilot
    mcp_servers:
      web-search:
        command: sh
        args: ["-c", "MODE=stdio DEFAULT_SEARCH_ENGINE=bing exec npx -y open-websearch@latest"]
        tools: ["*"]
      context7:
        command: npx
        args: ["-y", "@upstash/context7-mcp@latest"]
        tools: ["*"]
      ms-learn:
        type: http
        url: https://learn.microsoft.com/api/mcp
        tools: ["*"]

  input:
    purpose:
      type: string
      required: true
      description: A clear description of what to create — the topic, goal, audience, and any constraints
    output_path:
      type: string
      required: false
      description: Optional file path for the output document (e.g. docs/my-report.md)

  context:
    mode: accumulate

  limits:
    max_iterations: 50

agents:
  - name: author
    description: Researches the topic deeply and produces a comprehensive, well-structured document tailored to the stated purpose
    model: claude-opus-4.6-1m
    input:
      - workflow.input.purpose
      - workflow.input.output_path?
      - content_reviewer.output?
      - quality_reviewer.output?
    system_prompt: |
      You are an expert Author agent. You research topics deeply, synthesize information
      from multiple sources, and produce clear, thorough, and well-structured written
      artifacts tailored to any purpose.

      Your core capabilities include:
      - Deep research across codebases, documentation, and the web
      - Synthesizing complex information into clear, structured documents
      - Adapting tone, depth, and structure to match the purpose and audience
      - Supporting evidence-based reasoning with concrete examples and references
      - Iterating on feedback to refine and improve your work

      Your documents are:
      - Grounded in evidence from research (codebase, web, documentation)
      - Structured appropriately for the content type and audience
      - Thorough yet focused — covering what matters without unnecessary padding
      - Honest about uncertainty, limitations, and open questions
    prompt: |
      Create a comprehensive document based on the following purpose:

      **Purpose:** {{ workflow.input.purpose }}

      {% if content_reviewer is defined and content_reviewer.output and content_reviewer.output.score < 85 %}
      **Content Review Feedback (Score: {{ content_reviewer.output.score }}/100):**
      {{ content_reviewer.output.feedback }}

      {% if content_reviewer.output.critical_issues %}
      **Critical Issues:**
      {% for issue in content_reviewer.output.critical_issues %}
      - {{ issue }}
      {% endfor %}
      {% endif %}

      **IMPORTANT:** You are revising an existing document. Read the document at
      `{{ author.output.file_path }}` and update it to address the feedback.
      Preserve content that is satisfactory.
      {% endif %}

      {% if quality_reviewer is defined and quality_reviewer.output and quality_reviewer.output.score < 85 %}
      **Quality Review Feedback (Score: {{ quality_reviewer.output.score }}/100):**
      {{ quality_reviewer.output.feedback }}

      {% if quality_reviewer.output.critical_issues %}
      **Critical Issues:**
      {% for issue in quality_reviewer.output.critical_issues %}
      - {{ issue }}
      {% endfor %}
      {% endif %}

      **IMPORTANT:** You are revising an existing document. Read the document at
      `{{ author.output.file_path }}` and update it to address the feedback.
      Preserve content that is satisfactory.
      {% endif %}

      ---

      ## Phase 1: Research

      Before writing, perform thorough research appropriate to the purpose:

      ### Codebase Analysis (if the purpose involves code or software)
      - Explore the relevant portions of the codebase deeply
      - Identify existing components, patterns, abstractions, and conventions
      - Understand the current architecture and how things fit together
      - Note any constraints, technical debt, or relevant context

      ### External Research
      - Search the web for relevant context, best practices, and prior art
      - Look up documentation for key technologies, libraries, or concepts involved
      - Research multiple perspectives and sources to ensure balanced coverage
      - Identify authoritative references to cite

      ---

      ## Phase 2: Write the Document

      Determine the most appropriate structure based on what the purpose demands.
      Do NOT force a rigid template — let the content dictate the structure.

      General guidelines:
      - **Start with context** — briefly orient the reader on what this document covers and why
      - **Organize logically** — use sections and headings that reflect the natural structure of the content
      - **Be evidence-based** — ground claims in research, cite sources, provide concrete examples
      - **Be precise** — avoid vague or aspirational language; if something is uncertain, say so
      - **Include a conclusion or summary** — synthesize key takeaways
      - **Add references** — link to sources, documentation, and related materials

      Adapt depth and formality to the purpose:
      - A technical comparison should be balanced and data-driven
      - A proposal should be persuasive but honest about trade-offs
      - A research report should be thorough and well-sourced
      - A guide should be practical and sequenced for the reader
      - An analysis should show its reasoning and methodology

      ---

      ## REVISION NOTES

      {% if content_reviewer is defined or quality_reviewer is defined %}
      After revising the document, provide a concise summary of what you changed and why
      in your `revision_notes` output. Structure it as a bullet list, e.g.:
      - Corrected statistics per content reviewer feedback
      - Restructured comparison section for clarity per quality feedback
      - Added missing references for key claims

      This helps reviewers understand what changed.
      {% else %}
      This is the first draft. Set `revision_notes` to "Initial draft."
      {% endif %}

      ---

      ## SAVING THE DOCUMENT

      After creating the document, save it to a file.

      {% if workflow.input.output_path %}
      Save the document to: `{{ workflow.input.output_path }}`
      {% else %}
      Choose a file path using the following convention:

      - If the purpose input references a document path, derive the name from that document
        and save it in the same directory. Examples:
        - `grpc-comparison.brainstorm.md` → `grpc-comparison.md`
        - `auth-proposal.draft.md` → `auth-proposal.md`
      - Otherwise:
        - Save the document in the current working directory.
        - Use a descriptive slug: `[descriptive-slug].md`
        - Examples:
          - `grpc-vs-rest-comparison.md`
          - `q3-incident-analysis.md`
          - `onboarding-guide.md`
      {% endif %}
    output:
      file_path:
        type: string
        description: The path where the document was saved
      revision_notes:
        type: string
        description: Summary of changes made in this revision (empty on first draft)
    routes:
      - to: content_reviewer

  - name: content_reviewer
    description: Reviews the document for accuracy, depth, completeness, and soundness of reasoning
    model: claude-opus-4.6-1m
    input:
      - workflow.input.purpose
      - author.output.file_path
      - author.output.revision_notes
    system_prompt: |
      You are a Senior Content Reviewer with broad expertise spanning software engineering,
      technology, business, and technical communication. You review documents for accuracy,
      depth, completeness, and soundness of reasoning.

      You are especially attentive to:
      - Factual accuracy of claims (technical details, statistics, attributions)
      - Whether conclusions are supported by evidence presented in the document
      - Completeness of coverage relative to the stated purpose
      - Logical soundness of arguments and reasoning
      - Whether the document delivers on what the purpose requires
      - Balanced treatment of different perspectives (where applicable)
    prompt: |
      Review the document for **content accuracy and completeness**.

      **Original Purpose:**
      {{ workflow.input.purpose }}

      **Document Location:**
      {{ author.output.file_path }}

      Read the document from the file path above.

      {% if author.output.revision_notes and author.output.revision_notes != "Initial draft." %}
      **Author's Revision Notes:**
      {{ author.output.revision_notes }}

      The author has revised the document based on prior feedback. Use these notes to
      focus your review on the changed areas, while still checking overall content quality.
      {% endif %}

      ---

      ## Fact-Checking

      To verify the document's claims, independently check:
      - Technical claims by reading referenced source files and project files in the codebase
      - Factual claims by searching the web for authoritative sources
      - Whether evidence presented actually supports the conclusions drawn
      - Whether important perspectives or considerations are missing

      ---

      ## Evaluation Criteria

      Focus exclusively on **content** — accuracy, depth, and completeness:

      | Criteria | Description |
      |----------|-------------|
      | **Accuracy** | Are factual claims, technical details, and attributions correct? |
      | **Evidence Quality** | Are claims supported by research, data, or concrete examples? |
      | **Completeness** | Does the document fully address the stated purpose? Are there gaps? |
      | **Reasoning** | Are arguments logically sound? Do conclusions follow from evidence? |
      | **Depth** | Is the coverage sufficiently deep for the purpose and audience? |
      | **Balance** | Are different perspectives and trade-offs fairly represented? |
      | **Purpose Alignment** | Does the document deliver what the purpose requires? |
      | **Honesty** | Are limitations, uncertainties, and caveats properly disclosed? |

      Do NOT evaluate structure, formatting, or writing style — a separate reviewer handles that.

      Provide:
      1. A score from 0-100
      2. Whether the content is approved (score >= 85)
      3. Specific feedback on content issues
      4. List of critical content issues that must be addressed
    output:
      score:
        type: number
        description: Content accuracy and completeness score from 0-100
      approved:
        type: boolean
        description: Whether the content meets quality threshold (score >= 85)
      feedback:
        type: string
        description: Detailed feedback on content issues
      critical_issues:
        type: array
        description: List of critical content issues that must be addressed
    routes:
      - to: quality_reviewer
        when: "{{ output.approved }}"
      - to: author
        when: "{{ output.score < 85 }}"
      - to: quality_reviewer

  - name: quality_reviewer
    description: Reviews the document for structure, clarity, coherence, and readability
    model: gemini-3-pro-preview
    input:
      - workflow.input.purpose
      - author.output.file_path
      - author.output.revision_notes
      - content_reviewer.output
    system_prompt: |
      You are a Senior Editor and Document Reviewer. You specialize in evaluating
      written artifacts for structure, clarity, coherence, and readability. You ensure
      documents are well-organized, appropriately detailed for their audience, and
      achieve their communicative purpose.

      You focus on:
      - Document structure and logical flow
      - Clarity of writing and precision of language
      - Appropriate detail level for the target audience
      - Effective use of formatting (tables, lists, headings, code blocks)
      - Whether the document achieves its stated purpose from a communication standpoint
      - Coherence — whether sections connect logically and build on each other
    prompt: |
      Review the document for **structure, clarity, and readability**.

      **Original Purpose:**
      {{ workflow.input.purpose }}

      **Document Location:**
      {{ author.output.file_path }}

      Read the document from the file path above.

      **Content Review Status:** This document scored {{ content_reviewer.output.score }}/100
      on content accuracy and completeness.

      {% if author.output.revision_notes and author.output.revision_notes != "Initial draft." %}
      **Author's Revision Notes:**
      {{ author.output.revision_notes }}

      The author has revised the document based on prior feedback. Use these notes to
      focus your review on the changed areas, while still checking overall quality.
      {% endif %}

      ---

      ## Evaluation Criteria

      Focus exclusively on **structure and readability** — not content accuracy:

      | Criteria | Description |
      |----------|-------------|
      | **Structure** | Is the document logically organized with appropriate sections? |
      | **Clarity** | Is the writing clear, precise, and free of ambiguity? |
      | **Audience Fit** | Is the detail level and tone appropriate for the intended audience? |
      | **Coherence** | Do sections flow logically and build on each other? |
      | **Formatting** | Are tables, lists, headings, and code blocks used effectively? |
      | **Conciseness** | Is the document focused without unnecessary padding or repetition? |
      | **Opening/Closing** | Does the introduction orient the reader and the conclusion synthesize key points? |
      | **Actionability** | After reading, would the audience know what to think, decide, or do next? |

      Do NOT evaluate factual accuracy or technical correctness — that has been handled
      by a separate reviewer.

      Provide:
      1. A score from 0-100
      2. Whether the structure/readability is approved (score >= 85)
      3. Specific feedback on structure and clarity issues
      4. List of critical readability issues that must be addressed
    output:
      score:
        type: number
        description: Structure and readability score from 0-100
      approved:
        type: boolean
        description: Whether the document quality meets threshold (score >= 85)
      feedback:
        type: string
        description: Detailed feedback on structure and readability
      critical_issues:
        type: array
        description: List of critical quality issues that must be addressed
    routes:
      - to: $end
        when: "{{ output.approved }}"
      - to: author
        when: "{{ output.score < 85 }}"
      - to: $end

output:
  purpose: "{{ workflow.input.purpose }}"
  document_file: "{{ author.output.file_path }}"
  content_review_score: "{{ content_reviewer.output.score }}"
  quality_review_score: "{{ quality_reviewer.output.score }}"
  content_review_feedback: "{{ content_reviewer.output.feedback }}"
  quality_review_feedback: "{{ quality_reviewer.output.feedback }}"
  iterations: "{{ context.iteration }}"
